name: CI Check

on:
  push:
    branches: ['main', 'master']
  pull_request:
    branches: ['main', 'master']

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx vue-tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          TOTAL=$(du -sb dist/assets/ | cut -f1)
          TOTAL_KB=$((TOTAL / 1024))
          echo "Total bundle size: ${TOTAL_KB} KB"
          if [ "$TOTAL_KB" -gt 2048 ]; then
            echo "::warning::Bundle size is ${TOTAL_KB} KB (over 2MB)"
          fi
